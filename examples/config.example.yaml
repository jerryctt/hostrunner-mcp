allowed_roots:
  - /Users/you/code
allowed_commands:
  - codex
  # add more commands here as needed (e.g. git, gemini) for use with run_command
# Max wall-clock time for one host command (the codex review itself, or one
# run_command). Needs a unit (600s, 10m) — a bare number is rejected.
# NOTE: this file is read once at server startup; restart Claude Desktop after
# editing. The effective values are logged as "config loaded" in
# ~/Library/Logs/Claude/mcp-server-hostrunner.log.
timeout: 600s
max_output_bytes: 200000
# codex_extra_args: ["-c", "model=o3"]   # optional extra codex flags (e.g. config overrides)
stream_output: false   # tee codex output to the server log (mcp-server-hostrunner.log); set false to silence
